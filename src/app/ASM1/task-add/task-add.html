<p>task-add works!</p>
<form action="" [formGroup]="userForm" (ngSubmit)="onSubmit()">
<div class="">
    <label for="title">title</label>
    <input type="text" id="title" formControlName="title">
</div>
<div class="">
    <label for="description">description</label>
    <input type="text" id="description" formControlName="description">
</div>
<div class="">
    <label for="dueDate">dueDate</label>
    <input type="date" id="dueDate" formControlName="dueDate">
</div>
<div class="">
    <label for="status">status</label>
    <input type="checkbox" id="status" formControlName="status">
    <span>{{ userForm.get('status')?.value ? 'đã hoàn thành' : 'chưa hoàn thành' }}</span>
</div>
<div class="">
    <label for="priority">priority</label>
    <select name="priority" id="priority" formControlName="priority">
        <option value="cao">Cao</option>
        <option value="trungbinh">Trung Bình</option>
        <option value="thap">Thấp</option>
    </select>
</div>
<button type="submit">Add Task</button>
</form>
