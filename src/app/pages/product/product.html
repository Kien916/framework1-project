<p>product works!</p>
<a routerLink="/product-add"></a>
<table>
    <thead>
        <th>ID</th>
        <th>Name</th>
        <th>PRICE</th>
        <th>DESCRIPTION</th>
        <th>QUANTITY</th>
        <th>ACTION</th>
    </thead>
    <tbody>
        <tr *ngFor="let product of products()">
            <td>{{product.id}}</td>
            <td>{{product.name}}</td>
            <td>{{product.quantity}}</td>
            <td>{{product.description}}</td>
            <td>{{product.price}}</td>
            <td>
                <a [routerLink]="['/product-edit', product.id]">Edit</a>
                <button (click)="deleteProduct(product)" > xoá</button>
            </td>
        </tr>
    </tbody>
</table>
